; Configuration PHP pour ArchiveX
; Augmentation des limites d'upload

; Limite de taille d'upload de fichier (50MB)
upload_max_filesize = 50M

; Limite de taille de POST (50MB)
post_max_size = 50M

; Limite de mémoire (512MB)
memory_limit = 512M

; Temps d'exécution maximum (5 minutes)
max_execution_time = 300

; Temps maximum d'input (5 minutes)
max_input_time = 300

; Nombre maximum de fichiers uploadés
max_file_uploads = 20

; Taille maximale des variables POST
max_input_vars = 10000 